name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        # We will cache pip dependencies, but setup-python requires requirements.txt to exist first.
        # It's fine, we will create requirements.txt in the next commit.
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run linting checks
      run: |
        pip install ruff
        ruff check .
        ruff format --check . || true # Allow failure for now if user files are unformatted, but report status

    - name: Test with pytest
      run: |
        if [ -f requirements.txt ]; then python -m pytest -v; fi
